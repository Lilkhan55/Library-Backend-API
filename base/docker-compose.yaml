services:
  web:
    build: .
    command: sh -c "until pg_isready -h db -p 5432; do echo waiting for postgres; sleep 2; done; python manage.py migrate; gunicorn base.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  #nginx:
  #  image: nginx:latest
  #  ports:
  #    - "80:80"
  #    - "443:443"
  #  volumes:
  #    - ./nginx.conf:/etc/nginx/nginx.conf
  #    - /etc/letsencrypt/:/etc/letsencrypt
  #    - static:/app/staticfiles
  #    - media:/app/media
  #  depends_on:
  #    - web

  redis:
    image: redis:latest
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  postgres_data:
  static:
  media:
