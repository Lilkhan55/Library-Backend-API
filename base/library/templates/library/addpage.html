{% extends 'base.html' %}

{% block content %}
<h1>{{title}}</h1>
<form action="" method="post" enctype="multipart/form-data">
        <div class="form-error">{{ form.non_field_errors }}</div>

    <div class="addbook-grid">
      {% for f in form %}
        <div class="addbook-row">
          <label class="addbook-label" for="{{ f.id_for_label }}">{{ f.label }}</label>
          <div class="addbook-field">{{ f }}</div>
          <div class="form-error">{{ f.errors }}</div>
        </div>
      {% endfor %}
    </div>

    <button class="btn-contact" type="submit">Отправитель</button>
</form>
{% endblock %}
